document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ba3-1f16-4d4f-ae8e-857623e5fe4d\" alt=\"TKS Pumps\" style=\"height:46px; width:auto; display:block;\">\n      <div style=\"border:1.5px solid #1B2A3A; border-radius:9px; padding:7px 14px; line-height:1.05; display:flex; flex-direction:column; gap:3px;\">\n        <div style=\"font-family:'Space Grotesk'; font-weight:600; font-size:12px; color:#1B2A3A; letter-spacing:.2px;\">Centrifugal Double Suction<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:17px; color:#E07A38; letter-spacing:.3px;\">BƠM LY TÂM HAI CỬA HÚT<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'IBM Plex Mono'; font-size:12px; color:#6C7A87;\">Kéo để xoay · Lăn chuột để zoom · Rê chuột để xem tên chi tiết<\u002Fdiv>\n  <\u002Fdiv>\n\n  <section style=\"padding:30px 36px 40px;\" id=\"t1\">\n    <div style=\"display:flex; flex-wrap:wrap; gap:26px; align-items:flex-start;\">\n\n      <!-- ================= OPTION 1a ================= -->\n      <div class=\"dv-opt\" id=\"1a\" style=\"flex:1 1 100%; min-width:0; display:flex; flex-direction:column; gap:11px; scroll-margin-top:90px;\">\n\n        <div style=\"background:#fff; border:1px solid #D6CFBF; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(27,42,58,.07);\">\n          <div style=\"position:relative; height:548px; background:radial-gradient(circle at 45% 38%, #F7F4EC 0%, #E3DDD0 100%);\">\n            <canvas id=\"pumpA\" class=\"pumpview\" style=\"display:block; width:100%; height:100%; position:absolute; inset:0;\"><\u002Fcanvas>\n\n            <sc-if value=\"{{ showWarn }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute; left:50%; top:14px; transform:translateX(-50%); max-width:460px; display:flex; gap:9px; align-items:flex-start; padding:11px 15px; background:#7A1F12; color:#FCEAE4; border:1px solid #C0392B; border-radius:10px; box-shadow:0 6px 18px rgba(122,31,18,.32); font-family:'IBM Plex Sans',sans-serif; font-size:12.5px; line-height:1.4; z-index:6;\">\n                <span style=\"font-size:17px; line-height:1;\">⚠<\u002Fspan><span>{{ driveWarnText }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"position:absolute; left:16px; top:14px; padding:11px 14px; background:rgba(244,241,234,0.92); border:1px solid #D6CFBF; border-radius:11px; max-width:280px; pointer-events:none;\">\n              <div style=\"font-family:'IBM Plex Mono'; font-size:10px; letter-spacing:1.5px; color:#6C7A87; margin-bottom:7px;\">ĐƯỜNG ĐI LƯU CHẤT<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-family:'Space Grotesk'; font-weight:600; font-size:12px; color:#1B2A3A;\">\n                <span>{{ flowPath }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:6px; border-radius:4px; margin:9px 0 5px; background:linear-gradient(90deg,#2E86AB,#E07A38);\"><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-family:'IBM Plex Mono'; font-size:9.5px; color:#6C7A87;\"><span style=\"color:#2E86AB;\">áp thấp<\u002Fspan><span style=\"color:#E07A38;\">áp cao<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"position:absolute; right:16px; top:14px; display:flex; flex-direction:column; gap:7px; align-items:flex-end; pointer-events:none;\">\n              <div style=\"display:flex; align-items:center; gap:7px; padding:5px 10px; background:rgba(46,134,171,0.14); border:1px solid #2E86AB; border-radius:20px; font-family:'Space Grotesk'; font-weight:600; font-size:11.5px; color:#2E86AB;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#2E86AB;\"><\u002Fspan>Bơm hút cuối A<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:7px; padding:5px 10px; background:rgba(224,122,56,0.14); border:1px solid #E07A38; border-radius:20px; font-family:'Space Grotesk'; font-weight:600; font-size:11.5px; color:#E07A38;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#E07A38;\"><\u002Fspan>Bơm hút cuối B<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"position:absolute; left:50%; transform:translateX(-50%); bottom:14px; font-family:'Space Grotesk'; font-weight:600; font-size:12.5px; color:#1B2A3A; background:rgba(244,241,234,0.9); border:1px solid #D6CFBF; border-radius:8px; padding:5px 13px; pointer-events:none;\">{{ aStateLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:14px 18px; border-top:1px solid #EDE7DA;\">\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <div style=\"display:flex; align-items:center; gap:14px;\">\n                <span style=\"font-family:'IBM Plex Mono'; font-size:11px; color:#6C7A87; letter-spacing:.5px; width:104px; flex-shrink:0;\">TÁCH ⟷ GHÉP<\u002Fspan>\n                <div onpointerdown=\"{{ aDown }}\" onpointermove=\"{{ aMove }}\" onpointerup=\"{{ aUp }}\" style=\"flex:1; height:24px; display:flex; align-items:center; cursor:ew-resize; touch-action:none;\">\n                  <div style=\"position:relative; width:100%; height:5px; background:#D6CFBF; border-radius:3px;\">\n                    <div style=\"{{ aFill }}\"><\u002Fdiv>\n                    <div style=\"{{ aHandle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:8px; flex-shrink:0;\">\n                  <button onclick=\"{{ toggleOpenA }}\" style=\"{{ openBtn }}\">⬓ Mở nửa trên<\u002Fbutton>\n                  <button onclick=\"{{ toggleSpinA }}\" style=\"{{ aSpinBtn }}\">⟳ Quay<\u002Fbutton>\n                  <button onclick=\"{{ toggleDrive }}\" style=\"{{ driveBtn }}\">⇄ Đổi đầu nối ĐC<\u002Fbutton>\n                  <button onclick=\"{{ resetA }}\" style=\"{{ ghostBtn }}\">⌂ Góc nhìn<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\">\n                <span style=\"font-family:'IBM Plex Mono'; font-size:11px; color:#6C7A87; letter-spacing:.5px; width:104px; flex-shrink:0;\">CẮT BỔ ↓<\u002Fspan>\n                <div onpointerdown=\"{{ aCutDown }}\" onpointermove=\"{{ aCutMove }}\" onpointerup=\"{{ aCutUp }}\" style=\"flex:1; height:24px; display:flex; align-items:center; cursor:ew-resize; touch-action:none;\">\n                  <div style=\"position:relative; width:100%; height:5px; background:#D6CFBF; border-radius:3px;\">\n                    <div style=\"{{ aCutFill }}\"><\u002Fdiv>\n                    <div style=\"{{ aCutHandle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:12px; font-size:13px; line-height:1.5; color:#3D4A56;\">Hai bơm <strong style=\"color:#2E86AB;\">hút cuối<\u002Fstrong> giống hệt nhau, lắp <strong>lưng vào lưng<\u002Fstrong> trên <strong>một trục chung<\u002Fstrong>. Khi ghép, một <strong style=\"color:#2E86AB;\">lớp vỏ bọc ngoài<\u002Fstrong> (cửa hút chung) ôm kín hai cửa hút và cấp dòng cho cả hai mắt cánh — hai mặt bích hút riêng biến mất; <strong style=\"color:#E07A38;\">cửa xả<\u002Fstrong> gộp ra phương ngang đối diện. Ghép lại → chính là <strong style=\"color:#E07A38;\">bơm hút kép<\u002Fstrong>.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n\n    <\u002Fdiv>\n\n    <!-- shared spec strip -->\n    <div style=\"display:flex; flex-wrap:wrap; gap:13px; margin-top:24px;\">\n      <sc-for list=\"{{ specs }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"flex:1 1 210px; min-width:190px; background:#fff; border:1px solid #D6CFBF; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:9.5px; letter-spacing:1.2px; color:#6C7A87; margin-bottom:5px;\">{{ s.tag }}<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:18px; line-height:1.1; color:{{ s.color }}; margin-bottom:6px;\">{{ s.head }}<\u002Fdiv>\n          <div style=\"font-size:12.5px; line-height:1.45; color:#3D4A56;\">{{ s.body }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- technical info (giống mẫu End-Suction) -->\n    <div style=\"margin-top:30px;\">\n      <div style=\"display:flex; align-items:baseline; gap:10px; margin-bottom:14px; flex-wrap:wrap;\">\n        <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:18px; color:#1B2A3A;\">BƠM LY TÂM HAI CỬA HÚT (Bơm ly tâm hút kép / Double-Suction / Split-Case)<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #D6CFBF; border-radius:12px; padding:18px 20px; margin-bottom:14px;\">\n        <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#2E86AB; margin-bottom:7px;\">Tổng quan<\u002Fdiv>\n        <div style=\"font-size:13.5px; line-height:1.6; color:#3D4A56;\">Bơm ly tâm hút kép vỏ chia đôi dọc trục: một cửa hút được chia đôi, đưa chất lỏng vào bánh công tác từ <strong>hai phía đối xứng<\u002Fstrong>. Về nguyên lý tương đương <strong>hai bơm hút cuối ghép lưng-vào-lưng<\u002Fstrong> trên cùng một trục, đặt giữa hai ổ đỡ (between-bearings). Phù hợp ứng dụng <strong>lưu lượng lớn<\u002Fstrong>, cột áp trung bình–cao.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-wrap:wrap; gap:14px;\">\n        <div style=\"flex:1 1 230px; min-width:215px; background:#fff; border:1px solid #D6CFBF; border-top:3px solid #2E86AB; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:14px; color:#1B2A3A; margin-bottom:11px;\">Đặc điểm cấu tạo<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Bánh công tác hút kép — dòng vào đối xứng hai phía.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Vỏ chia đôi ngang qua tâm trục (axially-split).<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Trục đặt giữa hai ổ bi, hai bộ phớt hai đầu.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Cửa hút &amp; cửa xả nằm ngang, đối diện ở nửa vỏ dưới.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1 1 230px; min-width:215px; background:#fff; border:1px solid #D6CFBF; border-top:3px solid #1F8A5B; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:14px; color:#1B2A3A; margin-bottom:11px;\">Ưu điểm<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Lưu lượng lớn — xấp xỉ gấp đôi hút cuối cùng cỡ.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">NPSHr thấp → ít xâm thực, khả năng hút tốt.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Lực dọc trục triệt tiêu → ổ bi nhẹ tải, chạy êm, bền.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Bảo dưỡng nhanh: nhấc nửa vỏ trên, không tháo ống.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\"><strong>Hiệu suất cao — tới ~85–92%<\u002Fstrong> (cỡ lớn) → tiết kiệm năng lượng, chi phí vận hành &amp; điện năng thấp.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1 1 230px; min-width:215px; background:#fff; border:1px solid #D6CFBF; border-top:3px solid #C0392B; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:14px; color:#1B2A3A; margin-bottom:11px;\">Nhược điểm<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#C0392B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Kích thước &amp; khối lượng lớn, chiếm diện tích.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#C0392B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Giá thành cao, kết cấu phức tạp hơn hút cuối.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#C0392B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Hai phớt + hai ổ đỡ → nhiều điểm bảo trì.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#C0392B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Cần căn tâm chính xác; nhạy với lệch trục/đường ống.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1 1 230px; min-width:215px; background:#fff; border:1px solid #D6CFBF; border-top:3px solid #E07A38; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:14px; color:#1B2A3A; margin-bottom:11px;\">Ứng dụng<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Cấp nước đô thị, trạm bơm công suất lớn.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Tưới tiêu, thủy lợi, thoát nước.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:8px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Nước làm mát nhà máy điện &amp; công nghiệp.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Hệ thống PCCC lưu lượng lớn.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- impeller type limitation & fluid notes -->\n    <div style=\"margin-top:14px; background:#fff; border:1px solid #D6CFBF; border-radius:12px; padding:18px 20px;\">\n      <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#1B2A3A; margin-bottom:13px;\">Kiểu cánh công tác &amp; lưu chất<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:20px;\">\n        <div style=\"flex:1 1 290px; min-width:260px;\">\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:13px; color:#2E86AB; margin-bottom:9px;\">Giới hạn kiểu cánh — vì sao<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Gần như chỉ dùng <strong>cánh kín (closed)<\u002Fstrong>, nhiều cánh, dạng hút kép đối xứng quanh đĩa giữa.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Không dùng <strong>cánh hở / bán hở<\u002Fstrong>: hai phía hút đối xứng nên không có mặt vách làm chuẩn khe hở.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Không dùng <strong>cánh xoáy (vortex) / cánh vít<\u002Fstrong> — vốn là thiết kế một cửa hút, không hút kép được.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Lý do: cần khép hai đường dòng &amp; giữ đối xứng thủy lực để cân bằng lực dọc trục.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 290px; min-width:260px;\">\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:13px; color:#E07A38; margin-bottom:9px;\">Lưu ý về lưu chất<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Chỉ hợp <strong>chất lỏng sạch / ít tạp chất<\u002Fstrong> (nước sạch, nước làm mát, nước đã xử lý).<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\"><strong>Không<\u002Fstrong> bơm nước thải nhiều rác/sợi, bùn, hạt mài mòn → nghẹt 2 mắt hút, mòn vòng mòn, khó thông tắc.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Nhạy <strong>dòng hút lệch<\u002Fstrong>: cần đoạn ống hút thẳng để chia dòng đều, tránh rung &amp; xâm thực một bên.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Ưu tiên <strong>độ nhớt thấp<\u002Fstrong>; độ nhớt cao làm tụt hiệu suất.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- H–Q characteristic curve -->\n    <div style=\"margin-top:30px;\">\n      <div style=\"display:flex; align-items:baseline; gap:10px; margin-bottom:14px; flex-wrap:wrap;\">\n        <div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:1.5px; color:#6C7A87;\">ĐƯỜNG ĐẶC TÍNH<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:18px; color:#1B2A3A;\">Đường đặc tính H–Q &amp; điểm làm việc<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #D6CFBF; border-radius:12px; padding:20px; display:flex; flex-wrap:wrap; gap:20px; align-items:center;\">\n        <div style=\"flex:1 1 440px; min-width:300px;\">\n          <svg viewBox=\"0 0 760 520\" style=\"width:100%; touch-action:none; cursor:ew-resize;\" onpointerdown=\"{{ onChartDown }}\" onpointermove=\"{{ onChartMove }}\" onpointerup=\"{{ onChartUp }}\">\n            <line x1=\"90\" y1=\"40\" x2=\"90\" y2=\"440\" stroke=\"#1B2A3A\" stroke-width=\"2\"><\u002Fline>\n            <line x1=\"90\" y1=\"440\" x2=\"710\" y2=\"440\" stroke=\"#1B2A3A\" stroke-width=\"2\"><\u002Fline>\n            <text x=\"60\" y=\"48\" font-family=\"IBM Plex Mono\" font-size=\"13\" fill=\"#1B2A3A\">H<\u002Ftext>\n            <text x=\"690\" y=\"466\" font-family=\"IBM Plex Mono\" font-size=\"13\" fill=\"#1B2A3A\">Q<\u002Ftext>\n            <text x=\"38\" y=\"245\" font-family=\"IBM Plex Mono\" font-size=\"11\" fill=\"#6C7A87\" transform=\"rotate(-90 38 245)\">Cột áp (m)<\u002Ftext>\n            <text x=\"350\" y=\"488\" font-family=\"IBM Plex Mono\" font-size=\"11\" fill=\"#6C7A87\">Lưu lượng (m³/h)<\u002Ftext>\n            <rect x=\"{{ appX1 }}\" y=\"40\" width=\"{{ appW }}\" height=\"400\" fill=\"#1F8A5B\" opacity=\"0.09\"><\u002Frect>\n            <text x=\"{{ appX1 }}\" y=\"58\" font-family=\"IBM Plex Mono\" font-size=\"10.5\" fill=\"#1F8A5B\">vùng làm việc cho phép<\u002Ftext>\n            <g stroke=\"#D6CFBF\" stroke-width=\"1\"><line x1=\"90\" y1=\"140\" x2=\"710\" y2=\"140\"><\u002Fline><line x1=\"90\" y1=\"240\" x2=\"710\" y2=\"240\"><\u002Fline><line x1=\"90\" y1=\"340\" x2=\"710\" y2=\"340\"><\u002Fline><\u002Fg>\n            <polyline points=\"{{ pumpCurve }}\" fill=\"none\" stroke=\"#1B2A3A\" stroke-width=\"3.5\"><\u002Fpolyline>\n            <polyline points=\"{{ sysCurve }}\" fill=\"none\" stroke=\"#2E86AB\" stroke-width=\"2.5\" stroke-dasharray=\"7 5\"><\u002Fpolyline>\n            <polyline points=\"{{ effCurve }}\" fill=\"none\" stroke=\"#7E8A95\" stroke-width=\"2\" stroke-dasharray=\"3 4\"><\u002Fpolyline>\n            <polyline points=\"{{ powerCurve }}\" fill=\"none\" stroke=\"#8E5BA8\" stroke-width=\"2.5\"><\u002Fpolyline>\n            <polyline points=\"{{ npshCurve }}\" fill=\"none\" stroke=\"#C0392B\" stroke-width=\"2\" stroke-dasharray=\"2 4\"><\u002Fpolyline>\n            <text x=\"600\" y=\"150\" font-family=\"IBM Plex Mono\" font-size=\"12\" fill=\"#8E5BA8\">công suất P<\u002Ftext>\n            <text x=\"150\" y=\"408\" font-family=\"IBM Plex Mono\" font-size=\"12\" fill=\"#C0392B\">NPSHr<\u002Ftext>\n            <circle cx=\"{{ bepX }}\" cy=\"{{ bepY }}\" r=\"6\" fill=\"#E07A38\"><\u002Fcircle>\n            <text x=\"{{ bepX }}\" y=\"{{ bepYL }}\" text-anchor=\"middle\" font-family=\"IBM Plex Mono\" font-size=\"11\" fill=\"#E07A38\">BEP<\u002Ftext>\n            <text x=\"556\" y=\"118\" font-family=\"IBM Plex Mono\" font-size=\"12\" fill=\"#1B2A3A\">đường bơm H–Q<\u002Ftext>\n            <text x=\"536\" y=\"392\" font-family=\"IBM Plex Mono\" font-size=\"12\" fill=\"#2E86AB\">đường ống (hệ thống)<\u002Ftext>\n            <text x=\"150\" y=\"120\" font-family=\"IBM Plex Mono\" font-size=\"12\" fill=\"#7E8A95\">hiệu suất<\u002Ftext>\n            <line x1=\"{{ curX }}\" y1=\"40\" x2=\"{{ curX }}\" y2=\"440\" stroke=\"#C0392B\" stroke-width=\"1\" stroke-dasharray=\"4 4\" opacity=\".6\"><\u002Fline>\n            <circle cx=\"{{ curX }}\" cy=\"{{ curY }}\" r=\"9\" fill=\"#C0392B\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 200px; min-width:200px; display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"padding:12px 15px; background:#F7F4EC; border:1px solid #E3DDD0; border-radius:9px;\"><div style=\"font-family:'IBM Plex Mono'; font-size:10px; color:#6C7A87;\">LƯU LƯỢNG Q<\u002Fdiv><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600; color:#1B2A3A;\">{{ readQ }} m³/h<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:12px 15px; background:#F7F4EC; border:1px solid #E3DDD0; border-radius:9px;\"><div style=\"font-family:'IBM Plex Mono'; font-size:10px; color:#6C7A87;\">CỘT ÁP H<\u002Fdiv><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600; color:#2E86AB;\">{{ readH }} m<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:12px 15px; background:#F7F4EC; border:1px solid #E3DDD0; border-radius:9px;\"><div style=\"font-family:'IBM Plex Mono'; font-size:10px; color:#6C7A87;\">HIỆU SUẤT<\u002Fdiv><div style=\"font-family:'Space Grotesk'; font-size:22px; font-weight:600; color:#E07A38;\">{{ readEff }} %<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono'; font-size:11px; line-height:1.5; color:#6C7A87;\">↔ Kéo điểm đỏ dọc đường cong bơm. Điểm làm việc là giao của đường bơm với đường ống; chọn quanh <span style=\"color:#E07A38;\">BEP<\u002Fspan> để hiệu suất cao nhất.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 4-type comparison -->\n    <div style=\"margin-top:30px;\">\n      <div style=\"display:flex; align-items:baseline; gap:10px; margin-bottom:14px; flex-wrap:wrap;\">\n        <div style=\"font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:1.5px; color:#6C7A87;\">SO SÁNH<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:18px; color:#1B2A3A;\">4 kiểu bơm ly tâm theo hướng dòng chảy<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative; height:7px; border-radius:5px; background:linear-gradient(90deg,#2E86AB,#3F8FA0,#E07A38,#1F8A5B); margin:0 4px 26px;\">\n        <div style=\"position:absolute; left:0; top:11px; font-family:'IBM Plex Mono'; font-size:10.5px; color:#6C7A87;\">cột áp cao · Ns thấp<\u002Fdiv>\n        <div style=\"position:absolute; right:0; top:11px; font-family:'IBM Plex Mono'; font-size:10.5px; color:#6C7A87;\">lưu lượng lớn · Ns cao<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:14px;\">\n        <div style=\"flex:1 1 210px; min-width:200px; background:#fff; border:1px solid #D6CFBF; border-top:3px solid #2E86AB; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:9px; letter-spacing:1px; color:#6C7A87;\">END-SUCTION<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#2E86AB; margin-bottom:10px;\">Ly tâm hút cuối<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Vào dọc trục, ra hướng tâm 90°; một cửa hút.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Cột áp cao, lưu lượng vừa.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#2E86AB; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Có lực dọc trục → cần ổ chặn.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 210px; min-width:200px; background:#FFF6EE; border:2px solid #E07A38; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:9px; letter-spacing:1px; color:#B5611F;\">DOUBLE-SUCTION · BƠM NÀY<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#E07A38; margin-bottom:10px;\">Ly tâm hút kép<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Hai cửa hút đối xứng → lưu lượng LỚN.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Lực dọc trục triệt tiêu, chạy êm.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#E07A38; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Vỏ chia đôi, đặt giữa hai ổ đỡ.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 210px; min-width:200px; background:#fff; border:1px solid #D6CFBF; border-top:3px solid #3F8FA0; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:9px; letter-spacing:1px; color:#6C7A87;\">MIXED-FLOW<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#3F8FA0; margin-bottom:10px;\">Hỗn hợp<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#3F8FA0; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Dòng ra theo phương chéo (~30–60°).<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#3F8FA0; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Vừa ly tâm vừa hướng trục.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#3F8FA0; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Cột áp &amp; lưu lượng đều khá lớn.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 210px; min-width:200px; background:#fff; border:1px solid #D6CFBF; border-top:3px solid #1F8A5B; border-radius:12px; padding:15px 17px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:9px; letter-spacing:1px; color:#6C7A87;\">AXIAL-FLOW<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#1F8A5B; margin-bottom:10px;\">Hướng trục<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Vào–ra dọc trục như chân vịt.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start; margin-bottom:7px;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Lưu lượng RẤT lớn.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:8px; align-items:flex-start;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#1F8A5B; margin-top:7px; flex-shrink:0;\"><\u002Fdiv><div style=\"font-size:12.5px; line-height:1.4; color:#1B2A3A;\">Cột áp thấp.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n      <div style=\"margin-top:14px; background:#fff; border:1px solid #D6CFBF; border-radius:12px; padding:16px 18px;\">\n        <div style=\"font-family:'Space Grotesk'; font-weight:700; font-size:14px; color:#1B2A3A; margin-bottom:12px;\">Đặc trưng đường đặc tính H–Q của 4 loại<\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start; margin-bottom:9px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:10.5px; font-weight:700; color:#2E86AB; background:#EAF3F7; border-radius:5px; padding:3px 8px; flex-shrink:0; white-space:nowrap; min-width:92px; text-align:center;\">Hút cuối<\u002Fdiv>\n          <div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Đường H–Q <strong>dốc vừa<\u002Fstrong>, cột áp giảm đều khi lưu lượng tăng; công suất trục tăng dần theo Q. Đặc tính ổn định, dễ điều khiển.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start; margin-bottom:9px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:10.5px; font-weight:700; color:#E07A38; background:#FBEFE4; border-radius:5px; padding:3px 8px; flex-shrink:0; white-space:nowrap; min-width:92px; text-align:center;\">Hút kép<\u002Fdiv>\n          <div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Cùng dạng đường cong ly tâm nhưng <strong>lưu lượng ≈ gấp đôi<\u002Fstrong> ở cùng cột áp; đường H–Q êm, <strong>vùng hiệu suất cao rộng<\u002Fstrong> quanh BEP.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start; margin-bottom:9px;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:10.5px; font-weight:700; color:#3F8FA0; background:#E8F1F3; border-radius:5px; padding:3px 8px; flex-shrink:0; white-space:nowrap; min-width:92px; text-align:center;\">Hỗn hợp<\u002Fdiv>\n          <div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Đường H–Q <strong>dốc hơn<\u002Fstrong> ly tâm; cột áp giảm nhanh hơn theo Q. Công suất trục khá phẳng — ít quá tải khi lưu lượng đổi.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n          <div style=\"font-family:'IBM Plex Mono'; font-size:10.5px; font-weight:700; color:#1F8A5B; background:#E9F4EE; border-radius:5px; padding:3px 8px; flex-shrink:0; white-space:nowrap; min-width:92px; text-align:center;\">Hướng trục<\u002Fdiv>\n          <div style=\"font-size:12.5px; line-height:1.45; color:#1B2A3A;\">Đường H–Q <strong>rất dốc<\u002Fstrong>: cột áp sụt mạnh ở lưu lượng thấp (dễ có vùng \"yên ngựa\" không ổn định); công suất trục <strong>giảm khi Q tăng<\u002Fstrong> — ngược với ly tâm.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;flowSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.3,&quot;max&quot;:2.5,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Hoạt cảnh&quot;},&quot;spinSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0,&quot;max&quot;:2.5,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Hoạt cảnh&quot;}}\">\nclass Component extends DCLogic {\n  state = { mergeA: 0.0, spinA: true, dragA: false, cutA: 0.0, dragCutA: false, openA: false, driveSide: 1, showWarn: false, qf: 0.55, cdrag: false, cutB: 0.0, explodeB: false, spinB: true, dragB: false };\n\n  // ---------- slider helpers ----------\n  frac(e) { const r = e.currentTarget.getBoundingClientRect(); return Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)); }\n  aDown = (e) => { try { e.currentTarget.setPointerCapture(e.pointerId); } catch (x) {} this.setState({ dragA: true, mergeA: this.frac(e) }); };\n  aMove = (e) => { if (this.state.dragA) this.setState({ mergeA: this.frac(e) }); };\n  aUp = () => this.setState({ dragA: false });\n  aCutDown = (e) => { try { e.currentTarget.setPointerCapture(e.pointerId); } catch (x) {} this.setState({ dragCutA: true, cutA: this.frac(e) }); };\n  aCutMove = (e) => { if (this.state.dragCutA) this.setState({ cutA: this.frac(e) }); };\n  aCutUp = () => this.setState({ dragCutA: false });\n  bDown = (e) => { try { e.currentTarget.setPointerCapture(e.pointerId); } catch (x) {} this.setState({ dragB: true, cutB: this.frac(e) }); };\n  bMove = (e) => { if (this.state.dragB) this.setState({ cutB: this.frac(e) }); };\n  bUp = () => this.setState({ dragB: false });\n  toggleSpinA = () => this.setState(s => ({ spinA: !s.spinA }));\n  toggleOpenA = () => this.setState(s => ({ openA: !s.openA }));\n  toggleDrive = () => {\n    this.setState(s => ({ driveSide: -s.driveSide, showWarn: true }));\n    if (this._warnT) clearTimeout(this._warnT);\n    this._warnT = setTimeout(() => { if (!this._stopped) this.setState({ showWarn: false }); }, 5200);\n  };\n  toggleSpinB = () => this.setState(s => ({ spinB: !s.spinB }));\n  toggleExplodeB = () => this.setState(s => ({ explodeB: !s.explodeB }));\n  resetA = () => { const r = this.rigs && this.rigs.A; if (r) { r.yaw = 0.92; r.pitch = 0.34; r.dist = 16.5; } };\n  resetB = () => { const r = this.rigs && this.rigs.B; if (r) { r.yaw = 0.72; r.pitch = 0.42; r.dist = 9.8; } };\n\n  // ---------- H–Q characteristic chart ----------\n  mapX(f) { return 90 + f * 560; }\n  mapH(H) { return 440 - (H / 70) * 400; }\n  pumpH(f) { return 60 - 45 * f * f; }\n  sysH(f) { return 12 + 38 * f * f; }\n  effV(f) { const e = 82 * (1 - Math.pow((f - 0.55) / 0.52, 2)); return Math.max(0, e); }\n  poly(fn) { let s = ''; for (let i = 0; i <= 40; i++) { const f = i / 40; s += this.mapX(f).toFixed(1) + ',' + this.mapH(fn(f)).toFixed(1) + ' '; } return s.trim(); }\n  powerP(f) { return 0.35 + 0.62 * f + 0.08 * f * f; }   // công suất tương đối, tăng theo Q\n  npshR(f) { return 0.08 + 0.55 * f * f; }                // NPSHr tương đối, tăng theo Q²\n  mapFrac(v) { return 440 - (v / 1.25) * 400; }\n  polyF(fn) { let s = ''; for (let i = 0; i <= 40; i++) { const f = i / 40; s += this.mapX(f).toFixed(1) + ',' + this.mapFrac(fn(f)).toFixed(1) + ' '; } return s.trim(); }\n  qFromEvent(e) { const r = e.currentTarget.getBoundingClientRect(); const px = ((e.clientX - r.left) / r.width) * 760; return Math.max(0, Math.min(1, (px - 90) / 560)); }\n  onChartDown = (e) => { try { e.currentTarget.setPointerCapture(e.pointerId); } catch (x) {} this.setState({ cdrag: true, qf: this.qFromEvent(e) }); };\n  onChartMove = (e) => { if (this.state.cdrag) this.setState({ qf: this.qFromEvent(e) }); };\n  onChartUp = () => this.setState({ cdrag: false });\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    this.rigs = {};\n    this.mergeCur = 0; this .CatmullRomCurve3([\n      new THREE.Vector3(-3.1, 0, 0), new THREE.Vector3(-2.4, 0, s * 0.4),\n      new THREE.Vector3(-1.4, 0, s * (g * 0.5)), new THREE.Vector3(-0.2, 0, s * (g + 0.7)),\n      new THREE.Vector3(0, 0, s * (g + 1.3))\n    ], false, 'catmullrom', 0.5);\n  }\n  // split casing into a fixed bottom half + a liftable top-half clone (\"mở nửa trên\")\n  setupSplitA(rig) {\n    const THREE = window.THREE;\n    rig.planeBottom = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0); // bottom keeps y<=0\n    rig.planeTop = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);     // top keeps y>=lift\n    rig.topClones = [];\n    const targets = [];\n    [rig.modL, rig.modR, rig.join].forEach(root => root && root.traverse(m => { if (m.isMesh && m.userData && m.userData.split) targets.push(m); }));\n    targets.forEach(m => {\n      m.material = m.material.clone();\n      const baseOp = (m.material.opacity == null ? 1 : m.material.opacity);\n      m.material.clippingPlanes = [rig.clip, rig.planeBottom];\n      m.material.userData.baseOp = baseOp;\n      const c = m.clone();\n      c.material = m.material.clone();\n      c.material.clippingPlanes = [rig.planeTop];\n      c.material.userData.baseOp = baseOp;\n      c.userData = { baseY: c.position.y, label: 'Nửa trên vỏ (nhấc ra)', baseOp: m.userData.baseOp };\n      m.parent.add(c);\n      rig.topClones.push(c);\n    });\n  }\n\n  pathA(t, s, g) {\n    const mf = this._mfA == null ? 1 : this._mfA;\n    if (mf >= 0.999) return this.pathMerged(t, s, g);\n    if (mf <= 0.001) return this.pathSep(t, s, g);\n    const a = this.pathSep(t, s, g), b = this.pathMerged(t, s, g);\n    return [a[0] + (b[0] - a[0]) * mf, a[1] + (b[1] - a[1]) * mf, a[2] + (b[2] - a[2]) * mf];\n  }\n\n  // separated: each end-suction pump's own loop (own suction port → eye → vanes → own discharge)\n  pathSep(t, s, g) {\n    const L = (a, b, u) => [a[0] + (b[0] - a[0]) * u, a[1] + (b[1] - a[1]) * u, a[2] + (b[2] - a[2]) * u];\n    const eye = [0, 0, s * ; rig.scene.add(gRotor); rig.rotor = gRotor;\n    const spin = new THREE.Group(); gRotor.add(spin); rig.rotorSpin = spin;\n    const web = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 0.12, 44), this.solidMat(0x3D5566, 0.55, 0.45)); web.rotation.x = Math.PI / 2; spin.add(web);\n    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.46, 0.46, 1.1, 26), this.solidMat(0x4A6072, 0.55, 0.45)); hub.rotation.x = Math.PI / 2; spin.add(hub);\n    const vaneGeo = this.bladeGeo();\n    for (const s of [1, -1]) {\n      const vmat = this.solidMat(s > 0 ? 0x5A4636 : 0x2F4A60, 0.5, 0.5);\n      for (let k = 0; k < 6; k++) { const v = new THREE.Mesh(vaneGeo, vmat); v.rotation.z = (k * Math.PI) / 3; if (s < 0) v.rotation.y = Math.PI; v.position.z = s * 0.2; spin.add(v); }\n      const shroud = new THREE.Mesh(new THREE.RingGeometry(0.56, 1.6, 44), this.glassMat(0x4A6378, 0.5)); shroud.position.z = s * 0.48; spin.add(shroud);\n      const lip = new THREE.Mesh(new THREE.TorusGeometry(0.56, 0.09, 12, 30), this.solidMat(0x5E7A88, 0.5, 0.5)); lip.position.z = s * 0.53; spin.add(lip);\n      const eye = new THREE.Mesh(new THREE.CircleGeometry(0.46, 30), new THREE.MeshBasicMaterial({ color: 0xE53935, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthWrite: false })); eye.position.z = s * 0.66; gRotor.add(eye); }\n    const rim = new THREE.Mesh(new THREE.CylinderGeometry(1.58, 1.58, 0.96, 44, 1, true), this.glassMat(0x4A6378, 0.5)); rim.rotation.x = Math.PI / 2; spin.add(rim);\n    rig.eyes = gRotor.children.filter(c => c.material && c.material.color && c.material.color.getHex() === 0xE53935);\n    // shaft through\n    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 6.0, 22), this.solidMat(0x8A96A0, 0.7, 0.35)); shaft.rotation.x = Math.PI / 2; spin.add(shaft); shaft.userData.label = 'Trục chung';\n    // two seals where shaft exits\n    for (const s of [1, -1]) {\n      const sc = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.45, 24, 1, true), shellC(0xB4C6D0)); sc.rotation.x = Math.PI / 2; sc.position.z = s * 1.1; sc.userData.label = 'Phớt làm kín'; gRotor.add(sc);\n      const sf = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.16, 24), this.solidMat(0xE07A38, 0.3, 0.55)); sf.rotation.x = Math.PI / 2; sf.position.z = s * 1.0; sf.userData.label = 'Phớt làm kín'; spin.add(sf);\n    }\n    gRotor.userData.label = 'Cánh hút kép (double-suction)';\n\n    // centre symmetry plane (glowing)\n    const plane = new THREE.Mesh(new THREE.CircleGeometry(2.3, 48), new THREE.MeshBasicMaterial({ color: 0xF2C84B, transparent: true, opacity: 0.16, side: THREE.DoubleSide, depthWrite: false }));\n    plane.rotation.y = Math.PI / 2; rig.scene.add(plane); rig.symPlane = plane;\n\n    // axial thrust arrows (inward, cancelling) — green\n    rig.thrust = new THREE.Group(); rig.scene.add(rig.thrust);\n    for (const s of [1, -1]) {\n      const shaftA = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8, 12), new THREE.MeshBasicMaterial({ color: 0x1F8A5B })); shaftA.rotation.x = Math.PI / 2; shaftA.position.z = s * 1.7; rig.thrust.add(shaftA);\n      const head = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.34, 16), new THREE.MeshBasicMaterial({ color: 0x1F8A5B })); head.rotation.x = -s * Math.PI / 2; head.position.z = s * 1.25; head.userData.label = 'Lực dọc trục triệt tiêu'; rig.thrust.add(head); }\n\n    rig.labelTargets = [gCasing, gSuc, gDis, gRotor];\n    this.makeParticles(rig, 28);\n  }\n  pathB(t, s) {\n    const L = (a, b, u) => [a[0] + (b[0] - a[0]) * u, a[1] + (b[1] - a[1]) * u, a[2] + (b[2] - a[2]) * u];\n    if (t < 0.12) return L([-3.1, -0.25, 0], [-1.9, -0.25, 0], t / 0.12);\n    if (t < 0.40) { const pts = [[-1.9, -0.25, 0], [-1.3, -0.16, s * 0.4], [-0.6, -0.05, s * 0.55], [0, 0, s * 0.5]]; const seg = (t - 0.12) / 0.28 * 3; const i = Math.min(2, Math.floor(seg)); return L(pts[i], pts[i + 1], seg - i); }\n    if (t < 0.70) { const u = (t - 0.40) / 0.30; const ang = s * u * 2.0 * Math.PI; const r = 0.5 + 1.3 * u; return [r * Math.cos(ang), r * Math.sin(ang), s * 0.5 * (1 - u)]; }\n    if (t < 0.87) { const u = (t - 0.70) / 0.17; return L([1.8, 0, 0], [0.9, 1.55, 0], u); }\n    const u = (t - 0.87) / 0.13; return L([0.9, 1.55, 0], [0.9, 2.4, 0], u);\n  }\n\n  // ============================================================\n  //  RENDER LOOP\n  // ============================================================\n  rigVisible(rig) {\n    const r = rig.canvas.getBoundingClientRect();\n    return r.bottom > -40 && r.top < (window.innerHeight + 40) && r.width > 0;\n  }\n  loop() {\n    if (this._stopped) return;\n    this._raf = requestAnimationFrame(() => this.loop());\n    if (!this.rigs) return;\n    const now = performance.now(), dt = Math.min(0.05, (now - (this.last || now)) / 1000); this.last = now;\n    const flowSpeed = this.props.flowSpeed != null ? this.props.flowSpeed : 1;\n    const spinSpeed = this.props.spinSpeed != null ? this.props.spinSpeed : 1;\n    const st = this.state;\n\n    // shared lerps\n    this.mergeCur += (st.mergeA - this.mergeCur) * Math.min(1, dt * 6);\n    this.cutCur += (st.cutB - this.cutCur) * Math.min(1, dt * 6);\n    this.cutCurA += (st.cutA - (this.cutCurA || 0)) * Math.min(1, dt * 6);\n    this.openCur += (((st.openA ? 1 : 0)) - (this.openCur || 0)) * Math.min(1, dt * 5);\n    if (st.spinA || st.spinB) this.spinAngle -= dt * 1.4 * spinSpeed;\n    const ang = this.spinAngle;\n\n    // ----- Rig A update -----\n    const A = this.rigs.A;\n    if (A && A.modL) {\n      this.gapA = 2.3 - this.mergeCur * 1.85; // 2.3 .. 0.45\n      const g = this.gapA;\n      A.clip.constant = 2.5 - (this.cutCurA || 0) * 3.0; // top-down section cut\n      // the split-casing \"open top half\" only applies to the assembled pump — separating closes it back so each end-suction pump keeps its full casing\n      const mergeGate = Math.max(0, Math.min(1, (this.mergeCur - 0.6) / 0.3));\n      const lift = (this.openCur || 0) * 1.55 * mergeGate; // lift the top half of the casing\n      if (A.planeTop) A.planeTop.constant = -lift;\n      if (A.topClones) A.topClones.forEach(c => { c.position.y = c.userData.baseY + lift; });\n      A.modL.position.z = -g; A.modR.position.z = g;\n      if (st.spinA) { if (A.modL.userData.spin) A.modL.userData.spin.rotation.z = ang; if (A.modR.userData.spin) A.modR.userData.spin.rotation.z = ang; }\n      // join fade\n      const f = Math.max(0, Math.min(1, (this.mergeCur - 0.55) / 0.4));\n      if (A.join) A.join.traverse(m => { if (m.material && m.userData.baseOp != null) m.material.opacity = m.userData.baseOp * f; });\n      // the two end-suction inlet nozzles fade out as the outer suction jacket takes over\n      [A.modL, A.modR].forEach(mod => { const sg = mod.userData.sucGrp; if (sg) sg.traverse(m => { if (m.material && m.userData.baseOp != null) { m.material.transparent = true; m.material.opacity = m.userData.baseOp * (1 - f); } }); });\n      // drivetrain (shaft through jacket → seals → bearing housings) appears with assembly\n      if (A.driveStatic) A.driveStatic.traverse(m => { if (m.material && m.userData.baseOp != null) m.material.opacity = m.userData.baseOp * f; });\n      if (A.driveSpin) { A.driveSpin.traverse(m => { if (m.material && m.userData.baseOp != null) m.material.opacity = m.userData.baseOp * f; }); if (st.spinA) A.driveSpin.rotation.z = ang; }\n      // highlight the active motor drive end (coupling) per driveSide\n      if (A.couplingParts) A.couplingParts.forEach(m => { m.visible = (m.userData.coup === st.driveSide); }); // chỉ phía đầu nối đang chọn có trục chờ; phía kia biến mất\n      // eye glow blink\n      [A.modL, A.modR].forEach(mod => { if (mod.userData.eye) { mod.userData.eye.visible = st.spinA; mod.userData.eye.material.opacity = 0.2 + 0.45 * (0.5 + 0.5 * Math.sin(now / 1000 * 5)); } });\n      // particles — blend flow between separated (2 end-suction loops) and merged (double-suction)\n      this._mfA = Math.max(0, Math.min(1, (this.mergeCur - 0.3) / 0.45));\n      if (A.particles) {\n        const P = A.particles; const show = st.spinA;\n        P.mat.opacity += ((show ? 0.95 : 0) - P.mat.opacity) * Math.min(1, dt * 5);\n        for (let k = 0; k < P.N; k++) {\n          P.phase[k] = (P.phase[k] + dt * 0.1 * flowSpeed) % 1;\n          const p = this.pathA(P.phase[k], (k % 2) ? 1 : -1, g);\n          P.pos[k * 3] = p[0]; P.pos[k * 3 + 1] = p[1]; P.pos[k * 3 + 2] = p[2];\n          this.cTmp.copy(this.cBlue).lerp(this.cOrange, Math.min(1, P.phase[k] * 1.15));\n          P.col[k * 3] = this.cTmp.r; P.col[k * 3 + 1] = this.cTmp.g; P.col[k * 3 + 2] = this.cTmp.b;\n        }\n        P.geo.attributes.position.needsUpdate = true; P.geo.attributes.color.needsUpdate = true;\n      }\n      const cp = Math.cos(A.pitch), sp = Math.sin(A.pitch);\n      A.cam.position.set(A.dist * cp * Math.sin(A.yaw), A.dist * sp, A.dist * cp * Math.cos(A.yaw));\n      A.cam.lookAt(0, 0.7, 0);\n      if (this.rigVisible(A)) { this.syncSize(A); A.renderer.render(A.scene, A.cam); }\n    }\n\n    // ----- Rig B update -----\n    const B = this.rigs.B;\n    if (B && B.rotor) {\n      B.clip.constant = 3.0 - this.cutCur * 3.4;\n      const ex = st.explodeB ? 2.6 : 0;\n      B.rotorEx = (B.rotorEx == null ? 0 : B.rotorEx) + (ex - (B.rotorEx == null ? 0 : B.rotorEx)) * Math.min(1, dt * 5);\n      B.rotor.position.y = B.rotorEx;\n      if (st.spinB && B.rotorSpin) B.rotorSpin.rotation.z = ang;\n      if (B.eyes) B.eyes.forEach(e => { e.visible = st.spinB; e.material.opacity = 0.2 + 0.45 * (0.5 + 0.5 * Math.sin(now / 1000 * 5)); });\n      if (B.symPlane) B.symPlane.material.opacity = 0.1 + 0.1 * (0.5 + 0.5 * Math.sin(now / 1000 * 2));\n      if (B.thrust) { const showT = !st.explodeB; B.thrust.visible = showT; if (showT) { const pulse = 0.5 + 0.5 * Math.sin(now / 1000 * 3); B.thrust.children.forEach(c => { const base = 1.7; }); B.thrust.scale.setScalar(0.92 + 0.1 * pulse); } }\n      if (B.particles) {\n        const P = B.particles; const show = st.spinB && !st.explodeB;\n        P.mat.opacity += ((show ? 0.95 : 0) - P.mat.opacity) * Math.min(1, dt * 5);\n        for (let k = 0; k < P.N; k++) {\n          P.phase[k] = (P.phase[k] + dt * 0.11 * flowSpeed) % 1;\n          const p = this.pathB(P.phase[k], (k % 2) ? 1 : -1);\n          P.pos[k * 3] = p[0]; P.pos[k * 3 + 1] = p[1]; P.pos[k * 3 + 2] = p[2];\n          this.cTmp.copy(this.cBlue).lerp(this.cOrange, Math.min(1, P.phase[k] * 1.15));\n          P.col[k * 3] = this.cTmp.r; P.col[k * 3 + 1] = this.cTmp.g; P.col[k * 3 + 2] = this.cTmp.b;\n        }\n        P.geo.attributes.position.needsUpdate = true; P.geo.attributes.color.needsUpdate = true;\n      }\n      const cp = Math.cos(B.pitch), sp = Math.sin(B.pitch);\n      B.cam.position.set(B.dist * cp * Math.sin(B.yaw), B.dist * sp, B.dist * cp * Math.cos(B.yaw));\n      B.cam.lookAt(0, 0.3, 0);\n      if (this.rigVisible(B)) { this.syncSize(B); B.renderer.render(B.scene, B.cam); }\n    }\n  }\n  syncSize(rig) {\n    if (rig.canvas.clientWidth !== rig._lw || rig.canvas.clientHeight !== rig._lh) { rig._lw = rig.canvas.clientWidth; rig._lh = rig.canvas.clientHeight; this.resizeRig(rig); }\n  }\n\n  renderVals() {\n    const sa = this.state.mergeA, sb = this.state.cutB;\n    const aPct = (sa * 100) + '%', bPct = (sb * 100) + '%';\n    const ca = this.state.cutA; const aCutPct = (ca * 100) + '%';\n    const onTog = (on) => ({ padding: '8px 11px', borderRadius: '7px', fontFamily: \"'Space Grotesk',sans-serif\", fontWeight: 600, fontSize: '12px', cursor: 'pointer', border: '1.5px solid ' + (on ? '#E07A38' : '#C2BBA9'), background: on ? '#E07A38' : '#fff', color: on ? '#fff' : '#3D4A56', whiteSpace: 'nowrap' });\n    let aState = sa < 0.25 ? 'Hai bơm hút cuối riêng biệt' : (sa > 0.8 ? 'Đã ghép → bơm hút kép' : 'Đang ghép lưng vào lưng…');\n    if (this.state.cutA > 0.15) aState += ' · cắt bổ lộ rotor';\n    if (this.state.openA) aState += ' · mở nửa trên vỏ';\n    const bState = sb < 0.1 ? 'Vỏ kín — kéo để bổ đôi' : (sb > 0.85 ? 'Bổ đôi: lộ cánh hút kép đối xứng' : 'Đang cắt lớp…');\n    return {\n      aStateLabel: aState, bStateLabel: bState,\n      aFill: { position: 'absolute', left: 0, top: 0, height: '5px', background: '#1B2A3A', borderRadius: '3px', width: aPct },\n      aHandle: { position: 'absolute', top: '50%', left: aPct, width: '17px', height: '17px', background: '#E07A38', border: '3px solid #F4F1EA', borderRadius: '50%', transform: 'translate(-50%,-50%)', boxShadow: '0 1px 4px rgba(0,0,0,.25)' },\n      aCutFill: { position: 'absolute', left: 0, top: 0, height: '5px', background: '#5E7A88', borderRadius: '3px', width: aCutPct },\n      aCutHandle: { position: 'absolute', top: '50%', left: aCutPct, width: '17px', height: '17px', background: '#5E7A88', border: '3px solid #F4F1EA', borderRadius: '50%', transform: 'translate(-50%,-50%)', boxShadow: '0 1px 4px rgba(0,0,0,.25)' },\n      aCutDown: this.aCutDown, aCutMove: this.aCutMove, aCutUp: this.aCutUp,\n      bFill: { position: 'absolute', left: 0, top: 0, height: '5px', background: '#1B2A3A', borderRadius: '3px', width: bPct },\n      bHandle: { position: 'absolute', top: '50%', left: bPct, width: '17px', height: '17px', background: '#E07A38', border: '3px solid #F4F1EA', borderRadius: '50%', transform: 'translate(-50%,-50%)', boxShadow: '0 1px 4px rgba(0,0,0,.25)' },\n      aDown: this.aDown, aMove: this.aMove, aUp: this.aUp,\n      bDown: this.bDown, bMove: this.bMove, bUp: this.bUp,\n      toggleSpinA: this.toggleSpinA, toggleSpinB: this.toggleSpinB, toggleExplodeB: this.toggleExplodeB, toggleOpenA: this.toggleOpenA, toggleDrive: this.toggleDrive,\n      resetA: this.resetA, resetB: this.resetB,\n      aSpinBtn: onTog(this.state.spinA), bSpinBtn: onTog(this.state.spinB), bExplodeBtn: onTog(this.state.explodeB), openBtn: onTog(this.state.openA),\n      driveBtn: { padding: '8px 11px', borderRadius: '7px', fontFamily: \"'Space Grotesk',sans-serif\", fontWeight: 600, fontSize: '12px', cursor
