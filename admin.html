<style>
  :root{
    --bg:#08090d;--surface:#0e1018;--card:#151a25;--card2:#1b2133;--border:#232d42;--border2:#2e3a55;
    --accent:#4f8ef7;--a3:#34d399;--a4:#fb923c;--danger:#f87171;--text:#dde3f0;--muted:#64748b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;font-size:14px}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  header h1{font-size:16px;margin:0;letter-spacing:.5px}
  header .sp{flex:1}
  .pill{font-size:12px;padding:3px 9px;border-radius:999px;background:var(--card2);border:1px solid var(--border2);color:var(--muted)}
  button{cursor:pointer;border:1px solid var(--border2);background:var(--card2);color:var(--text);border-radius:7px;padding:6px 12px;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.pri{background:var(--accent);border-color:var(--accent);color:#06122b;font-weight:600}
  button.dng{background:transparent;border-color:#5a2330;color:var(--danger)}
  button.sm{padding:3px 8px;font-size:12px}
  nav{display:flex;flex-wrap:wrap;gap:6px;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border)}
  nav button{background:transparent;border:1px solid transparent}
  nav button.act{background:var(--card2);border-color:var(--border2);color:#fff}
  main{padding:18px;max-width:1300px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border:1px solid var(--border);padding:4px 6px;text-align:left;vertical-align:top}
  th{background:var(--card2);color:var(--muted);font-weight:600;position:sticky;top:0}
  td input,td select,input.f,select.f{width:100%;min-width:60px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 6px;font-size:13px}
  .tbl-wrap{overflow:auto;max-height:64vh;border:1px solid var(--border);border-radius:8px}
  .muted{color:var(--muted)}
  .center{display:flex;min-height:70vh;align-items:center;justify-content:center}
  .login{width:340px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px}
  .login h2{margin:0 0 4px}
  .login label{display:block;margin:12px 0 4px;font-size:12px;color:var(--muted)}
  #toast{position:fixed;right:18px;bottom:18px;z-index:50;display:flex;flex-direction:column;gap:8px}
  .t{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:13px;box-shadow:0 6px 24px #0008}
  .t.ok{border-color:#1e5a3a}.t.err{border-color:#5a2330;color:var(--danger)}
  .hint{font-size:12px;color:var(--muted);margin:8px 0}
  .flag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:999px;background:#2a1d05;border:1px solid #5a3f12;color:var(--a4)}
  h3.sec{margin:18px 0 8px;font-size:14px;color:var(--accent)}
</style>

// ====================== EDITOR BẢNG GENERIC ======================
async function renderTable(name){
  const cfg = TABLES[name];
  $('#main').innerHTML = `<div class="card"><div class="row" style="margin-bottom:10px">
    <h3 style="margin:0">${cfg.label}</h3><div class="sp" style="flex:1"></div>
    <button class="sm" onclick="renderTable('${name}')">↻ Tải lại</button>
    <button class="sm pri" onclick="addRow('${name}')">+ Thêm dòng</button></div>
    <div class="tbl-wrap"><table id="tb"></table></div>
    <div class="hint">Sửa trực tiếp ô → bấm <b>Lưu</b> ở dòng. Quyền ghi theo vai trò (RLS) — nếu bị chặn sẽ báo lỗi.</div></div>`;
  const { data, error } = await sb.from(name).select('*').order(cfg.order, {ascending:true});
  if(error) return toast(error.message,'err');
  const head = '<tr>'+cfg.cols.map(c=>`<th${c.w?` style="width:${c.w}px"`:''}>${c.k}</th>`).join('')+'<th style="width:120px">—</th></tr>';
  const body = (data||[]).map(r=>rowHtml(name,r)).join('');
  $('#tb').innerHTML = head + body;
}
function rowHtml(name,r){
  const cfg=TABLES[name];
  const pkv = Array.isArray(cfg.pk)? cfg.pk.map(k=>r[k]).join('|') : r[cfg.pk];
  const cells = cfg.cols.map(c=>{
    const v = r[c.k]==null?'':r[c.k];
    return `<td><input data-k="${c.k}" value="${esc(v)}"></td>`;
  }).join('');
  return `<tr data-pk="${esc(pkv==null?'':pkv)}">${cells}
    <td><button class="sm pri" onclick="saveRow('${name}',this)">Lưu</button>
        <button class="sm dng" onclick="delRow('${name}',this)">Xoá</button></td></tr>`;
}
window.addRow = name => { const empty={}; document.querySelector('#tb').insertAdjacentHTML('beforeend', rowHtml(name, empty)); };

function collect(tr,cfg){
  const o={};
  tr.querySelectorAll('input[data-k]').forEach(inp=>{
    let v = inp.value;
    const c = cfg.cols.find(x=>x.k===inp.dataset.k);
    if(v==='') v = null;
    else if(c && c.t==='num') v = Number(v);
    o[inp.dataset.k]=v;
  });
  return o;
}
window.saveRow = async (name, btn)=>{
  const cfg=TABLES[name]; const tr=btn.closest('tr'); const obj=collect(tr,cfg);
  const pkArr = Array.isArray(cfg.pk)?cfg.pk:[cfg.pk];
  const hasPk = pkArr.every(k=> obj[k]!=null && obj[k]!=='' );
  let res;
  // với bảng id tự tăng: dòng mới (id rỗng) → insert (bỏ id)
  if(name==='kpi'||name==='donhang'||name==='meta'||name==='doanhso'){
    res = await sb.from(name).upsert(obj).select();
  } else if(hasPk){
    const id = obj[cfg.pk]; const patch={...obj}; delete patch[cfg.pk];
    res = await sb.from(name).update(patch).eq(cfg.pk,id).select();
  } else {
    const ins={...obj}; if(cfg.pk in ins) delete ins[cfg.pk];
    res = await sb.from(name).insert(ins).select();
  }
  if(res.error) return toast(res.error.message,'err');
  toast('Đã lưu','ok'); renderTable(name);
};
window.delRow = async (name, btn)=>{
  const cfg=TABLES[name]; const tr=btn.closest('tr'); const pkv=tr.dataset.pk;
  if(!pkv){ tr.remove(); return; }
  if(!confirm('Xoá dòng này?')) return;
  let q=sb.from(name).delete();
  if(Array.isArray(cfg.pk)){ const parts=pkv.split('|'); cfg.pk.forEach((k,i)=>q=q.eq(k,parts[i])); }
  else q=q.eq(cfg.pk, isNaN(pkv)?pkv:Number(pkv));
  const { error } = await q;
  if(error) return toast(error.message,'err');
  toast('Đã xoá','ok'); renderTable(name);
};

window.addAccount = async ()=>{
  const email=$('#na_email').value.trim(), pw=$('#na_pw').value;
  if(!email||!pw) return toast('Cần email và mật khẩu','err');
  if(pw.length<6) return toast('Mật khẩu tối thiểu 6 ký tự','err');
  const btn=$('#na_btn'); btn.disabled=true;
  // Client phụ: signUp tạo auth user mới mà KHÔNG ghi đè phiên admin (persistSession:false)
  const tmp = supabase.createClient(SB_URL, SB_ANON, {auth:{storageKey:'tks_tmp_signup',persistSession:false,autoRefreshToken:false}});
  const { data, error } = await tmp.auth.signUp({ email, password:pw });
  if(error){ btn.disabled=false; return toast(error.message,'err'); }
  const uid = data.user && data.user.id;
  if(!uid){ btn.disabled=false; return toast('Đã gửi yêu cầu nhưng chưa lấy được ID (có thể cần xác nhận email trước).','err'); }
  // Ghi hồ sơ qua phiên admin (có quyền tai_khoan/config). upsert: trigger tạo sẵn row → update, chưa có → insert.
  const prof={ id:uid, email,
    ho_ten:$('#na_hoten').value.trim()||null,
    chuc_nang:$('#na_cn').value.trim()||null,
    vai_tro:$('#na_vaitro').value,
    getfly_uid:$('#na_uid').value===''?null:Number($('#na_uid').value),
    active:true };
  const { error:e2 } = await sb.from('nguoi_dung').upsert(prof);
  btn.disabled=false;
  if(e2) return toast('Tạo đăng nhập OK nhưng lưu hồ sơ lỗi: '+e2.message,'err');
  toast('Đã tạo tài khoản '+email,'ok'); renderAccounts();
};
window.saveUser = async (id, btn)=>{
  const tr=btn.closest('tr'); const o={};
  tr.querySelectorAll('[data-k]').forEach(i=>{ let v=i.value; if(i.dataset.k==='getfly_uid') v=v===''?null:Number(v); if(i.dataset.k==='active') v=(v==='true'||v===true); o[i.dataset.k]=v; });
  const { error } = await sb.from('nguoi_dung').update(o).eq('id',id);
  if(error) return toast(error.message,'err'); toast('Đã lưu tài khoản','ok');
};
window.savePerm = async (btn)=>{
  const tr=btn.closest('tr'); const [vai_tro,resource,action]=tr.dataset.pk.split('|');
  const cho_phep = tr.querySelector('[data-k=cho_phep]').checked;
  const { error } = await sb.from('phan_quyen').upsert({vai_tro,resource,action,cho_phep});
  if(error) return toast(error.message,'err'); toast('Đã lưu quyền','ok');
};
window.addPerm = async ()=>{
  const vai_tro=prompt('vai_tro (admin/truong_phong/dieu_phoi/ky_thuat):'); if(!vai_tro)return;
  const resource=prompt('resource (kpi/nhansu/suco/ruiro/lichcongtac/doanhso/donhang/meta/tin_hieu/tai_khoan):'); if(!resource)return;
  const action=prompt('action (read/edit/signal/approve/config):'); if(!action)return;
  const { error } = await sb.from('phan_quyen').upsert({vai_tro,resource,action,cho_phep:true});
  if(error) return toast(error.message,'err'); toast('Đã thêm quyền','ok'); renderAccounts();
};

// ====================== TÍN HIỆU ======================
async function renderSignals(){
  $('#main').innerHTML = `<div class="card"><h3 class="sec">Tín hiệu đang áp dụng</h3>
    <div class="row" style="margin-bottom:8px"><button class="sm" onclick="renderSignals()">↻ Tải lại</button>
      <button class="sm pri" onclick="addSignal()">+ Gắn tín hiệu</button>
      <span class="hint">Tín hiệu áp ngay; đổi trạng thái chỉ ảnh hưởng hiển thị dashboard.</span></div>
    <div class="tbl-wrap"><table id="ts"></table></div></div>`;
  const { data, error } = await sb.from('tin_hieu').select('*').eq('trang_thai','active').order('thoi_gian',{ascending:false});
  if(error) return toast(error.message,'err');
  $('#ts').innerHTML = '<tr><th>đối tượng</th><th>id</th><th>hành động</th><th>ghi chú</th><th>lúc</th><th style="width:80px">—</th></tr>'
    + (data||[]).map(s=>`<tr><td>${esc(s.doi_tuong)}</td><td>${esc(s.doi_tuong_id)}</td>
        <td><span class="flag">${esc(s.hanh_dong)}</span></td><td>${esc(s.ghi_chu||'')}</td>
        <td class="muted">${esc((s.thoi_gian||'').replace('T',' ').slice(0,16))}</td>
        <td><button class="sm dng" onclick="cancelSignal(${s.id})">Huỷ cờ</button></td></tr>`).join('')
    + ((data||[]).length?'':'<tr><td colspan="6" class="muted">Chưa có tín hiệu nào.</td></tr>');
}
window.addSignal = async ()=>{
  const doi_tuong=prompt('đối tượng (congviec/donhang/suco):','congviec'); if(!doi_tuong)return;
  const doi_tuong_id=prompt('id đối tượng (task_id hoặc order_id):'); if(!doi_tuong_id)return;
  const hanh_dong=prompt('hành động (gan_co_uu_tien/ghim/an/canh_bao/doi_trang_thai):','gan_co_uu_tien'); if(!hanh_dong)return;
  const ghi_chu=prompt('ghi chú (tuỳ chọn):','')||null;
  const { error } = await sb.from('tin_hieu').insert({doi_tuong,doi_tuong_id,hanh_dong,ghi_chu,nguoi_gui:ME.id});
  if(error) return toast(error.message,'err'); toast('Đã gắn tín hiệu','ok'); renderSignals();
};
window.cancelSignal = async (id)=>{
  const { error } = await sb.from('tin_hieu').update({trang_thai:'da_huy'}).eq('id',id);
  if(error) return toast(error.message,'err'); toast('Đã huỷ cờ','ok'); renderSignals();
};

// ====================== CHI TIẾT ĐƠN (DH_*) ======================
async function renderOrderDetail(){
  const { data:orders } = await sb.from('donhang').select('order_id,kh').order('order_id');
  $('#main').innerHTML = `<div class="card"><div class="row">
    <h3 style="margin:0">Chi tiết đơn hàng</h3>
    <select class="f" id="ordSel" style="max-width:420px">
      <option value="">— Chọn đơn để sửa chi tiết —</option>
      ${(orders||[]).map(o=>`<option value="${o.order_id}" ${o.order_id==DH_ORDER?'selected':''}>${o.order_id} · ${esc(o.kh||'')}</option>`).join('')}
    </select></div>
    <div class="hint">Chọn đơn → sửa Thông tin / Cây việc / ToDo / Timeline / Hạng mục / Hồ sơ / Gantt. Lưu thẳng vào Supabase (web đơn lên ngay khi tải lại).</div>
    <div id="dhArea" style="margin-top:14px"></div></div>`;
  $('#ordSel').onchange = e => { DH_ORDER = e.target.value; loadDH(); };
  if(DH_ORDER) loadDH();
}
async function loadDH(){
  if(!DH_ORDER){ $('#dhArea').innerHTML=''; return; }
  let html='';
  for(const name in DH_DEFS){
    const cfg = DH_DEFS[name];
    const { data, error } = await sb.from(name).select('*').eq('order_id', DH_ORDER).order(cfg.single?'order_id':'id');
    if(error){ toast(error.message,'err'); continue; }
    if(cfg.single){
      const r=(data&&data[0])||{};
      html += `<h3 class="sec">${cfg.label}</h3><div class="card" id="dhinfo"><div class="tbl-wrap"><table><tbody>`+
        cfg.cols.map(k=>`<tr><th style="width:150px">${k}</th><td><input data-k="${k}" value="${esc(r[k]==null?'':r[k])}"></td></tr>`).join('')+
        `</tbody></table></div><div class="row" style="margin-top:8px"><button class="sm pri" onclick="saveDHInfo()">Lưu thông tin</button></div></div>`;
    } else {
      const head='<tr>'+cfg.cols.map(c=>`<th>${c.k}</th>`).join('')+'<th style="width:110px">—</th></tr>';
      const body=(data||[]).map(r=>dhRowHtml(name,r,cfg)).join('');
      html += `<h3 class="sec">${cfg.label} <button class="sm pri" style="margin-left:8px" onclick="dhAdd('${name}')">+ dòng</button></h3><div class="card"><div class="tbl-wrap"><table id="t_${name}">${head}${body}</table></div></div>`;
    }
  }
  $('#dhArea').innerHTML = html;
}
function dhRowHtml(name,r,cfg){
  const cells=cfg.cols.map(c=>`<td><input data-k="${c.k}" value="${esc(r[c.k]==null?'':r[c.k])}"></td>`).join('');
  return `<tr data-id="${r.id==null?'':r.id}">${cells}<td><button class="sm pri" onclick="dhSave('${name}',this)">Lưu</button><button class="sm dng" onclick="dhDel('${name}',this)">Xoá</button></td></tr>`;
}
window.dhAdd=name=>{ const cfg=DH_DEFS[name]; document.querySelector('#t_'+name).insertAdjacentHTML('beforeend', dhRowHtml(name,{},cfg)); };
window.dhSave=async(name,btn)=>{
  const cfg=DH_DEFS[name]; const tr=btn.closest('tr'); const id=tr.dataset.id;
  const o={order_id:Number(DH_ORDER)};
  tr.querySelectorAll('[data-k]').forEach(i=>{let v=i.value; const c=cfg.cols.find(x=>x.k===i.dataset.k); if(v==='')v=null; else if(c&&c.t==='num')v=Number(v); o[i.dataset.k]=v;});
  const res = id ? await sb.from(name).update(o).eq('id',id) : await sb.from(name).insert(o);
  if(res.error)return toast(res.error.message,'err'); toast('Đã lưu','ok'); loadDH();
};
window.dhDel=async(name,btn)=>{
  const tr=btn.closest('tr'); const id=tr.dataset.id; if(!id){tr.remove();return;}
  if(!confirm('Xoá dòng này?'))return;
  const {error}=await sb.from(name).delete().eq('id',id);
  if(error)return toast(error.message,'err'); toast('Đã xoá','ok'); loadDH();
};
window.saveDHInfo=async()=>{
  const o={order_id:Number(DH_ORDER)};
  document.querySelectorAll('#dhinfo [data-k]').forEach(i=>{o[i.dataset.k]=i.value===''?null:i.value;});
  const {error}=await sb.from('dh_info').upsert(o);
  if(error)return toast(error.message,'err'); toast('Đã lưu thông tin đơn','ok');
};

init();
</script>
