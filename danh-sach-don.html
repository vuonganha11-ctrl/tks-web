<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh sách đơn hàng — TKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700&family=Saira+Condensed:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2742; --navy2:#173a5e; --steel:#3d6695; --ice:#e8eef5; --ice2:#f4f7fb;
  --amber:#e08a00; --amber-soft:#fbeccd; --green:#2f7d4f; --green-soft:#e0f0e6;
  --red:#c0392b; --red-soft:#fbe5e2; --grey:#6b7a8d; --line:#d6dee8; --ink:#16202c;
  --shadow:0 1px 2px rgba(15,39,66,.06), 0 8px 24px rgba(15,39,66,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'IBM Plex Sans',sans-serif;color:var(--ink);
  background:
    radial-gradient(1200px 500px at 80% -10%, rgba(61,102,149,.10), transparent 60%),
    linear-gradient(180deg,#eef3f8 0%, #e6edf4 100%);
  background-attachment:fixed;line-height:1.5;padding:28px 18px 70px;
}
.wrap{max-width:1240px;margin:0 auto}
.mono{font-variant-numeric:tabular-nums}
.disp{font-family:'Saira Condensed',sans-serif;letter-spacing:.01em}
a{color:inherit}

/* ---------- HERO ---------- */
.hero{
  background:linear-gradient(135deg,var(--navy) 0%, var(--navy2) 60%, #1d456e 100%);
  color:#fff;border-radius:18px;padding:30px 34px;position:relative;overflow:hidden;
  box-shadow:var(--shadow);
}
.hero::after{content:"";position:absolute;inset:0;opacity:.10;
  background-image:repeating-linear-gradient(45deg,#fff 0 1px,transparent 1px 13px);pointer-events:none}
.hero .kick{font-family:'Saira',sans-serif;text-transform:uppercase;letter-spacing:.28em;
  font-size:11px;color:#9fc0e6;font-weight:600}
.hero h1{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:40px;line-height:1.02;
  text-transform:uppercase;margin:8px 0 4px}
.hero .cust{font-size:14.5px;color:#cfe0f2;font-weight:500;max-width:680px}
.hero .codeline{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);
  padding:5px 11px;border-radius:999px;color:#eaf2fb;text-decoration:none}
.chip:hover{background:rgba(255,255,255,.18)}
.hero .right{position:absolute;top:24px;right:28px;text-align:right}
.hero .right .u-k{font-size:10.5px;color:#9fc0e6;text-transform:uppercase;letter-spacing:.16em;font-weight:600}
.hero .right .u-v{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:26px;line-height:1.1}
.hero .right .u-m{font-size:11px;color:#cfe0f2;margin-top:2px}
.hero .right .logos{display:flex;gap:9px;justify-content:flex-end;margin-bottom:12px}
.logo-plate{background:#fff;border-radius:11px;padding:6px 10px;box-shadow:0 5px 16px rgba(0,0,0,.22);display:inline-flex;align-items:center}
.logo-plate img{display:block;height:46px;width:auto}
@media(max-width:560px){.hero .right .logos{justify-content:flex-start}.logo-plate img{height:38px}}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-top:18px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--steel)}
.kpi.k-amber::before{background:var(--amber)} .kpi.k-red::before{background:var(--red)}
.kpi.k-green::before{background:var(--green)} .kpi.k-navy::before{background:var(--navy)}
.kpi .k{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--steel);font-weight:700}
.kpi .n{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:34px;line-height:1;margin-top:7px;color:var(--navy)}
.kpi .s{font-size:11px;color:var(--grey);margin-top:4px}
.kpi.k-red .n{color:var(--red)} .kpi.k-amber .n{color:#9a5b00}
@media(max-width:1080px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.hero .right{position:static;text-align:left;margin-top:14px}.hero h1{font-size:30px}}

/* ---------- SECTIONS ---------- */
section{margin-top:28px}
.sec-h{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.sec-h .no{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:14px;color:#fff;
  background:var(--steel);width:28px;height:28px;border-radius:8px;display:grid;place-items:center}
.sec-h h2{font-family:'Saira Condensed',sans-serif;text-transform:uppercase;font-weight:700;
  font-size:22px;letter-spacing:.02em;color:var(--navy)}
.sec-h .cnt{font-family:'Saira',sans-serif;font-size:12px;font-weight:600;color:var(--grey);background:var(--ice);padding:3px 10px;border-radius:999px}
.sec-h .line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}

/* ---------- TABLES ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--navy);color:#fff;font-family:'Saira',sans-serif;font-weight:600;
  text-align:left;padding:11px 13px;font-size:11.5px;letter-spacing:.03em;text-transform:uppercase}
tbody td{padding:12px 13px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:nth-child(even){background:var(--ice2)}
tbody tr:hover{background:#eef4fb}
.cust-nm{font-family:'Saira Condensed',sans-serif;font-weight:700;color:var(--navy);font-size:15px;line-height:1.1}
.cust-sub{font-size:11.5px;color:var(--grey);margin-top:2px}
.id-link{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:13px;background:var(--navy);color:#fff!important;padding:3px 9px;border-radius:7px;text-decoration:none;white-space:nowrap;display:inline-block}
.id-link:hover{background:var(--steel)}
.num-r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}

/* progress bar */
.pb{width:120px}
.pb .bar{height:9px;border-radius:999px;background:var(--ice);overflow:hidden;border:1px solid var(--line)}
.pb .bar>i{display:block;height:100%}
.pb .lab{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--grey);margin-bottom:3px}

/* tags */
.tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.t-done{background:var(--green-soft);color:var(--green)}
.t-now{background:var(--amber-soft);color:#9a5b00}
.t-wait{background:var(--ice);color:var(--grey)}
.t-warn{background:var(--red-soft);color:var(--red)}

/* buttons */
.btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;text-decoration:none;white-space:nowrap;border:1px solid transparent;transition:.12s}
.btn-detail{background:var(--amber);color:#241500!important;box-shadow:0 2px 7px rgba(224,138,0,.30)}
.btn-detail:hover{background:#f0a429;transform:translateY(-1px)}
.btn-crm{background:#fff;color:var(--navy)!important;border-color:var(--line)}
.btn-crm:hover{border-color:var(--steel);background:var(--ice2)}

/* ---------- PEOPLE ---------- */
.people{display:grid;grid-template-columns:repeat(auto-fill,minmax(266px,1fr));gap:14px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:11px}
.pcard .top{display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:17px;color:#fff;flex:0 0 auto;background:var(--steel)}
.av-1{background:linear-gradient(135deg,#173a5e,#2c5a8a)} .av-2{background:linear-gradient(135deg,#e08a00,#f0a429)}
.av-3{background:linear-gradient(135deg,#2f7d4f,#3a9b62)} .av-4{background:linear-gradient(135deg,#3d6695,#5e84b0)}
.av-5{background:linear-gradient(135deg,#a5301f,#c0392b)} .av-6{background:linear-gradient(135deg,#5b4b8a,#7a68b0)}
.pcard .nm{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--navy);line-height:1.05}
.pcard .role{font-size:11.5px;color:var(--steel);font-weight:600;margin-top:1px}
.pcard .stats{display:flex;gap:8px}
.pstat{flex:1;background:var(--ice2);border:1px solid var(--line);border-radius:9px;padding:7px 9px;text-align:center}
.pstat .v{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:18px;line-height:1;color:var(--navy)}
.pstat.warn .v{color:var(--red)}
.pstat .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);font-weight:700;margin-top:3px}
.pcard .focus{font-size:11.5px;color:var(--ink);line-height:1.4}
.pcard .focus b{color:var(--navy)}

/* ---------- INCIDENTS ---------- */
.sev{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:7px;white-space:nowrap}
.sev-hi{background:var(--red-soft);color:var(--red)} .sev-md{background:var(--amber-soft);color:#9a5b00} .sev-lo{background:var(--ice);color:var(--grey)}
.sev i{width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block}
.late{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--red)}
.late.soft{color:#9a5b00}
.inc-src{font-size:11px;font-weight:700;color:#fff;padding:2px 7px;border-radius:5px;white-space:nowrap}
.src-5143{background:var(--amber)} .src-4811{background:var(--steel)}

footer{margin-top:34px;text-align:center;font-size:12px;color:var(--grey);line-height:1.7}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--grey)}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
@media(max-width:760px){.scrollx{overflow-x:auto}.scrollx table{min-width:720px}}

/* people task mini-list */
.viec-note{font-size:12px;color:#7a5a00;background:var(--amber-soft);border:1px solid #e7cf98;border-radius:10px;padding:10px 13px;margin-bottom:14px}
.pcard .ptasks{list-style:none;display:flex;flex-direction:column;gap:6px}
.pcard .ptasks li{display:flex;gap:7px;align-items:flex-start;font-size:11.5px;line-height:1.35;color:var(--ink)}
.pcard .ptasks a.tid{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:11px;background:var(--navy);color:#fff!important;padding:1px 6px;border-radius:5px;text-decoration:none;flex:0 0 auto}
.pcard .ptasks a.tid:hover{background:var(--steel)}
.pcard .ptasks .tl{color:var(--red);font-weight:700;white-space:nowrap;flex:0 0 auto;font-size:10.5px}
/* travel panel */
.travel{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tcol{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.tcol .th{display:flex;align-items:center;gap:9px;padding:13px 15px;color:#fff;font-family:'Saira Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:14px;letter-spacing:.02em}
.tcol .th .ic{font-size:16px}
.th-field{background:linear-gradient(135deg,#173a5e,#2c5a8a)} .th-car{background:linear-gradient(135deg,#2f7d4f,#3a9b62)} .th-fly{background:linear-gradient(135deg,#e08a00,#f0a429)}
.titems{padding:6px 14px 12px}
.titem{padding:10px 0;border-bottom:1px solid var(--line)}
.titem:last-child{border-bottom:none}
.titem .dt{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:12.5px;color:var(--navy)}
.titem.today .dt{color:var(--amber)}
.titem .desc{font-size:11.5px;color:var(--ink);margin-top:2px;line-height:1.4}
.titem .ppl{font-size:11px;color:var(--steel);font-weight:600;margin-top:2px}
.titem a.tid{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:10.5px;background:var(--ice);color:var(--navy)!important;padding:1px 6px;border-radius:5px;text-decoration:none}
.titem a.tid:hover{background:var(--steel);color:#fff!important}
.priv-note{font-size:11px;color:var(--grey);margin-top:10px;text-align:center}
@media(max-width:860px){.travel{grid-template-columns:1fr}}


.deptbar{margin:16px 0 10px}
.deptbadge{display:inline-flex;align-items:center;gap:7px;font-family:'Saira Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:13px;letter-spacing:.03em;color:#fff;padding:7px 14px;border-radius:9px}
.deptbadge.dv{background:linear-gradient(135deg,#173a5e,#2c5a8a)}
.deptbadge.pt{background:linear-gradient(135deg,#2f7d4f,#3a9b62)}
.deptbadge.sv{background:linear-gradient(135deg,#5b4b8a,#7a68b0)}



a.pstat{text-decoration:none;cursor:pointer;transition:.12s}
a.pstat:hover{border-color:var(--steel);background:#eef4fb;transform:translateY(-1px)}
a.pstat .l{color:var(--steel)}
.planstart{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--amber)}
.planend{font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:12.5px;color:var(--grey)}


.planwrap{display:flex;flex-direction:column;gap:14px}
.planp{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.planp .pp-head{display:flex;align-items:center;gap:12px;padding:13px 16px;background:linear-gradient(90deg,var(--ice2),#fff);border-bottom:1px solid var(--line)}
.planp .pp-meta{flex:1}
.planp .pp-meta .nm{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--navy);line-height:1.05}
.planp .pp-meta .role{font-size:11.5px;color:var(--steel);font-weight:600}
.pp-link{font-size:11.5px;font-weight:700;color:var(--navy)!important;background:#fff;border:1px solid var(--line);padding:6px 11px;border-radius:8px;text-decoration:none;white-space:nowrap}
.pp-link:hover{border-color:var(--steel);background:var(--ice2)}
.planlist{list-style:none;padding:6px 16px 12px}
.planlist li{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.planlist li:last-child{border-bottom:none}
.planlist .pst{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:13px;color:var(--amber);min-width:42px;flex:0 0 auto}
.planlist a.tid{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:11px;background:var(--navy);color:#fff!important;padding:1px 6px;border-radius:5px;text-decoration:none;flex:0 0 auto}
.planlist a.tid:hover{background:var(--steel)}
.planlist .pnm{flex:1;color:var(--ink)}
.planlist .pen{font-size:11px;color:var(--grey);white-space:nowrap;flex:0 0 auto}
@media(max-width:560px){.planlist .pen{display:none}}


.stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stats4 .pstat{min-width:0;background:var(--ice2);border:1px solid var(--line);border-radius:9px;padding:8px 3px;text-align:center;text-decoration:none;transition:.12s;display:block}
.stats4 .pstat:hover{border-color:var(--steel);background:#eef4fb;transform:translateY(-1px)}
.stats4 .pstat .v{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:19px;line-height:1;color:var(--navy)}
.stats4 .pstat .l{font-size:8.5px;text-transform:uppercase;letter-spacing:0;color:var(--grey);font-weight:700;margin-top:4px;line-height:1.15;white-space:normal}
.stats4 .s-today .v{color:var(--amber)} .stats4 .s-over .v{color:var(--red)} .stats4 .s-plan .v{color:var(--steel)}
.stats4 .s-today{background:linear-gradient(180deg,var(--amber-soft),#fff)} .stats4 .s-over{background:linear-gradient(180deg,var(--red-soft),#fff)} .stats4 .s-plan{background:linear-gradient(180deg,#e6eef9,#fff)}


.salesbox{margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}
.salesbox .sh{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--steel);font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.salesbox .sh a{color:var(--steel)!important;text-decoration:none;font-weight:700}
.salesbox .sh a:hover{color:var(--navy)!important}
.sline{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.sline .sl{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:10.5px;color:var(--grey);width:30px;flex:0 0 auto;text-transform:uppercase}
.sline .sb{flex:1;height:7px;border-radius:999px;background:var(--ice);overflow:hidden;border:1px solid var(--line)}
.sline .sb>i{display:block;height:100%}
.sline .sp{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:11px;min-width:36px;text-align:right;flex:0 0 auto}
.sline i.g,.sp.g{background:var(--green)} .sp.g{background:none;color:var(--green)}
.sline i.a{background:var(--amber)} .sp.a{color:#9a5b00}
.sline i.r{background:var(--red)} .sp.r{color:var(--red)}
.sline i.z{background:var(--line)} .sp.z{color:var(--grey)}


.salesreport{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
.sr-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sr-title{font-family:'Saira Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:15px;color:var(--navy);letter-spacing:.02em}
.sr-link{font-size:11.5px;font-weight:700;color:var(--steel)!important;text-decoration:none;background:var(--ice2);border:1px solid var(--line);padding:5px 10px;border-radius:8px}
.sr-link:hover{border-color:var(--steel)}
.sr-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.srk{background:var(--ice2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.srk .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);font-weight:700}
.srk .v{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--navy);line-height:1.05;margin-top:3px}
.srk .s{font-size:10.5px;color:var(--grey);font-weight:600;margin-top:1px}
.srk.hl{border-left:4px solid var(--amber);background:linear-gradient(90deg,var(--amber-soft),#fff 50%)}
.srk.hl .v{color:#9a5b00}
.sr-cap{font-size:11px;color:var(--grey);margin-bottom:6px}
.sr-cap span{color:#9aa7b6}
.sr-chartwrap{margin-top:4px}
.sr-chart{position:relative;display:flex;gap:30px;align-items:flex-end;height:120px;padding:0 14px;border-bottom:2px solid var(--line)}
.sr-target{position:absolute;left:0;right:0;top:0;border-top:2px dashed var(--amber)}
.sr-chart .bar{flex:1;display:flex;align-items:flex-end;justify-content:center;height:100%}
.sr-chart .col{width:54px;height:100%;display:flex;align-items:flex-end;background:linear-gradient(180deg,#f4f7fb,#fff);border-radius:6px 6px 0 0}
.sr-chart .col>i{display:block;width:100%;border-radius:6px 6px 0 0}
.sr-chart i.g{background:linear-gradient(180deg,#3a9b62,#2f7d4f)} .sr-chart i.a{background:linear-gradient(180deg,#f0a429,#e08a00)} .sr-chart i.r{background:linear-gradient(180deg,#d65a4c,#c0392b)}
.sr-x{display:flex;gap:30px;padding:8px 14px 0}
.sr-x .xc{flex:1;text-align:center}
.sr-x .xc b{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--navy);display:block}
.sr-x .xc span{font-size:11px;color:var(--grey);display:block}
.sr-x .xc em{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:13px;font-style:normal}
.sr-x em.g{color:var(--green)} .sr-x em.a{color:#9a5b00} .sr-x em.r{color:var(--red)}
@media(max-width:560px){.sr-kpis{grid-template-columns:repeat(2,1fr)}}


.ds2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dscol{background:var(--ice2);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.dsh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.dsh .badge{font-family:'Saira Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:13px;color:#fff;padding:4px 10px;border-radius:7px;letter-spacing:.02em}
.dsh .badge.dv{background:linear-gradient(135deg,#173a5e,#2c5a8a)} .dsh .badge.pt{background:linear-gradient(135deg,#2f7d4f,#3a9b62)}
.dsh .tgt{font-size:11px;color:var(--steel);font-weight:600}
.dsl{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.dsl:last-child{margin-bottom:0}
.dsl .dl{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--grey);width:38px;flex:0 0 auto;text-transform:uppercase}
.dsl .db{flex:1;height:9px;border-radius:999px;background:var(--ice);overflow:hidden;border:1px solid var(--line)}
.dsl .db>i{display:block;height:100%}
.dsl .dp{font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:13px;min-width:42px;text-align:right;flex:0 0 auto}
.dsl .da{font-size:11px;color:var(--grey);min-width:58px;text-align:right;flex:0 0 auto;font-variant-numeric:tabular-nums}
.dsl i.g{background:linear-gradient(90deg,#3a9b62,#2f7d4f)} .dp.g{color:var(--green)}
.dsl i.a{background:linear-gradient(90deg,#f0a429,#e08a00)} .dp.a{color:#9a5b00}
.dsl i.r{background:linear-gradient(90deg,#d65a4c,#c0392b)} .dp.r{color:var(--red)}
.dsl i.z{background:var(--line)} .dp.z{color:var(--grey)}
.ds-note{font-size:11px;color:var(--grey);margin-top:11px;line-height:1.5}
@media(max-width:560px){.ds2{grid-template-columns:1fr}}

</style>
</head>
<body>
<div class="wrap">
  <div id="sampleBanner" style="display:none;background:var(--amber-soft);border:1px solid #e7cf98;color:#7a5a00;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:600"></div>

  <div class="hero">
    <div class="kick">THAI KHUONG · QUẢN LÝ ĐƠN HÀNG</div>
    <h1>Danh sách đơn hàng</h1>
    <div class="cust" id="heroCount">—</div>
    <div class="right">
      <div class="logos">
        <span class="logo-plate"><img src="assets/logo-1.png" alt="TKT"></span>
        <span class="logo-plate"><img src="assets/logo-2.png" alt="TKS"></span>
      </div>
      <div class="u-k">Cập nhật</div>
      <div class="u-v" id="heroDate">—</div>
    </div>
  </div>

  <section>
    <div class="sec-h"><span class="no">&#9745;</span><h2>Tất cả đơn hàng</h2><span class="cnt" id="cnt"></span><span class="line"></span></div>
    <div style="margin:2px 0 14px">
      <input id="q" type="search" placeholder="Tìm theo khách hàng, dự án, mã đơn, Task…"
        style="width:100%;max-width:440px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:14px;box-shadow:var(--shadow)">
    </div>
    <div class="card scrollx">
      <table>
        <thead><tr>
          <th>Đơn hàng / Khách hàng</th><th style="width:92px">Task tổng</th>
          <th style="width:170px">Bước hiện tại</th><th style="width:120px">Hạn giao</th>
          <th style="width:170px">Thanh toán</th><th style="width:130px"></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>

  <footer id="footer"></footer>
  <div style="text-align:center;margin-top:14px"><a href="index.html" style="font-size:12px;color:var(--steel);text-decoration:none">&#8592; Về Dashboard</a></div>
</div>

<script src="config.js"></script>
<script src="sheet.js"></script>
<script>
/* dùng CHUNG một Sheet ID với index.html / don-hang.html */
var SHEET_ID = (window.TKS_SHEET_ID || "");
var PIPELINE = [
  { num: "0", nm: "Tạo đơn" }, { num: "1", nm: "PO / Hợp đồng" }, { num: "2", nm: "Tạm ứng" },
  { num: "3a", nm: "Mua hàng" }, { num: "3b", nm: "Khai hải quan" }, { num: "3c", nm: "Về kho" },
  { num: "4", nm: "Lắp đặt" }, { num: "5a", nm: "Sẵn sàng giao" }, { num: "5b", nm: "Đang giao" },
  { num: "5c", nm: "Giao xong" }, { num: "6", nm: "Nghiệm thu" }, { num: "7", nm: "TT đợt cuối" }
];
var SAMPLE = {
  Meta: [{ key: "cap_nhat", value: "30/05/2026 08:30" }],
  DH_Info: [
    { order_id: "5143", kh: "Ajinomoto Việt Nam", du_an: "OMAC", ma_crm: "5143", task_tong: "23714", buoc: "1", han_giao: "31/08/2026", phai_thu: "790776000", da_thu: "0", trang_thai: "Đã duyệt" },
    { order_id: "4811", kh: "Vietsovpetro", du_an: "Bảo trì máy nén", ma_crm: "4811", task_tong: "27821", buoc: "3a", han_giao: "30/09/2026", phai_thu: "1200000000", da_thu: "300000000", trang_thai: "Đang xử lý" }
  ]
};

var esc = Sheet.esc, num = Sheet.num, vnd = Sheet.vnd, task = Sheet.getflyTask;
function $(id) { return document.getElementById(id); }
function showBanner(m) { var b = $("sampleBanner"); b.textContent = "ⓘ " + m; b.style.display = "block"; }
function stepName(b) { var s = PIPELINE.find(function (x) { return x.num === String(b).trim(); }); return s ? ("Bước " + s.num + " · " + s.nm) : "—"; }

var ALL = [];
function rowHtml(r) {
  var due = num(r.phai_thu), paid = num(r.da_thu), pct = due ? Math.round(paid / due * 100) : 0;
  var barCol = pct >= 100 ? "green" : (pct > 0 ? "amber" : "steel");
  var idCell = r.task_tong ? '<a class="id-link" target="_blank" href="' + task(r.task_tong) + '">#' + esc(r.task_tong) + "</a>" : "—";
  return "<tr>" +
    '<td><div class="cust-nm">' + esc(r.kh) + '</div><div class="cust-sub">' + esc([r.du_an, "DH" + r.order_id, r.trang_thai].filter(Boolean).join(" · ")) + "</div></td>" +
    "<td>" + idCell + "</td>" +
    "<td>" + esc(stepName(r.buoc)) + "</td>" +
    "<td>" + esc(r.han_giao || "—") + "</td>" +
    '<td><div class="pb"><div class="lab">' + pct + "% · " + vnd(paid) + '</div><div class="bar"><i style="width:' + Math.min(pct, 100) + "%;background:var(--" + barCol + ')"></i></div></div></td>' +
    '<td><div class="btns"><a class="btn btn-detail" href="don-hang.html?id=' + encodeURIComponent(r.order_id) + '">Mở chi tiết</a></div></td>' +
    "</tr>";
}
function draw(list) {
  $("rows").innerHTML = list.length ? list.map(rowHtml).join("")
    : '<tr><td colspan="6" style="text-align:center;color:var(--grey);padding:22px">Không có đơn nào khớp.</td></tr>';
  $("cnt").textContent = list.length + "/" + ALL.length + " đơn";
}
function applyFilter() {
  var q = $("q").value.trim().toLowerCase();
  if (!q) return draw(ALL);
  draw(ALL.filter(function (r) {
    return [r.kh, r.du_an, r.order_id, r.ma_crm, r.task_tong, r.trang_thai]
      .map(function (x) { return String(x || "").toLowerCase(); }).join(" ").indexOf(q) >= 0;
  }));
}

(async function () {
  var data;
  if (SHEET_ID && SHEET_ID.trim()) {
    try {
      var info = await Sheet.fetchTab(SHEET_ID.trim(), "DH_Info");
      var meta = [];
      try { meta = await Sheet.fetchTab(SHEET_ID.trim(), "Meta"); } catch (e) { }
      data = { DH_Info: info, Meta: meta };
      if (!info.length) { data = SAMPLE; showBanner("Không đọc được DH_Info — đang dùng dữ liệu mẫu."); }
    } catch (e) {
      console.error(e); data = SAMPLE; showBanner("Không đọc được Google Sheet — đang dùng dữ liệu mẫu.");
    }
  } else {
    data = SAMPLE; showBanner("Chưa cấu hình Sheet ID — đang hiển thị dữ liệu mẫu.");
  }
  ALL = data.DH_Info || [];
  var cap = (data.Meta || []).find(function (x) { return String(x.key).trim() === "cap_nhat"; });
  $("heroDate").textContent = cap ? cap.value : "—";
  $("heroCount").textContent = "Tổng " + ALL.length + " đơn đang theo dõi";
  $("footer").innerHTML = "Nguồn: Getfly CRM · Bấm một đơn để mở trang theo dõi chi tiết.";
  draw(ALL);
  $("q").addEventListener("input", applyFilter);
})();
</script>
</body>
</html>
